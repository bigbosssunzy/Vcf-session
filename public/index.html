<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Boss VCF Hub</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --accent-green: #25d366;
            --accent-blue: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .vcard-container {
            background-color: var(--card-bg);
            border: 1px solid #243354;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .profile-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 16px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-blue);
        }

        h1 {
            font-size: 24px;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .channel-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: rgba(37, 211, 102, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            text-decoration: none;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .channel-btn:hover {
            background-color: var(--accent-green);
            color: #fff;
        }

        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: #0b0f19;
            border: 1px solid #243354;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .submit-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .download-box {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #243354;
        }

        .vcf-download-link {
            display: block;
            background-color: #fff;
            color: #0b0f19;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="vcard-container">
    <div class="profile-wrapper">
        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150" alt="Profile" class="profile-pic">
    </div>

    <h1>Big Boss Net 🚀</h1>
    <p class="subtitle">Enter details to save the compiled VCF network contacts</p>

    <a href="https://whatsapp.com/channel/0029VbCxwJeEgGfFhMx4zg3q" target="_blank" class="channel-btn">
        🟢 Follow the channel for the VCF file
    </a>

    <form id="registrationForm">
        <div class="input-group">
            <label>Name (Emojis Allowed)</label>
            <input type="text" id="nameInput" placeholder="e.g. Big Boss 👑" required>
        </div>
        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="phoneInput" placeholder="e.g. +2348000000000" required>
        </div>
        <button type="submit" class="submit-btn">Join VCF Compilation</button>
    </form>

    <div class="download-box" id="downloadSection" style="display: none;">
        <a href="/api/campaign/sample-campaign/download" id="vcfDownloadBtn" class="vcf-download-link">
            📥 Download Compiled VCF file
        </a>
    </div>
</div>

<script>
    const form = document.getElementById('registrationForm');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('nameInput').value;
        const phone = document.getElementById('phoneInput').value.trim();

        try {
            const response = await fetch('/api/campaign/sample-campaign/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone })
            });

            const data = await response.json();

            if (!response.ok) {
                alert(data.error || "Registration failed.");
                return;
            }

            alert(data.message);
            
            if (data.redirectUrl) {
                window.location.href = data.redirectUrl;
            }

        } catch (err) {
            console.error("Networking error:", err);
            alert("Connection error or server starting up. Try again in a moment.");
        }
    });

    // Make download section visible to everyone by default
    const campaignDownloadVisibility = "public"; 
    if (campaignDownloadVisibility === 'public') {
        document.getElementById('downloadSection').style.display = 'block';
    }
</script>

</body>
</html>
